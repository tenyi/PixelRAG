### 3x LLM+ViT v4: push capacity to max
### v3 (r=512, 2ep, lr 1e-5): 0.902. Try r=1024 to see if capacity still binds.

model_name_or_path: Qwen/Qwen3-VL-4B-Instruct
template: qwen3_vl
enable_thinking: false

dataset_dir: /scratch/users/zwcolin/cxr_embeds/sft_data/compressed_3x
dataset: compressed_qa_train
eval_dataset: compressed_qa_eval

stage: sft
do_train: true
finetuning_type: lora
freeze_vision_tower: false
lora_rank: 1024
lora_alpha: 1024
lora_target: all

per_device_train_batch_size: 2
gradient_accumulation_steps: 8
learning_rate: 8.0e-6
num_train_epochs: 1
lr_scheduler_type: cosine
warmup_ratio: 0.05
max_grad_norm: 1.0
bf16: true

per_device_eval_batch_size: 2
eval_strategy: steps
eval_steps: 400
eval_on_start: false
batch_eval_metrics: true
compute_accuracy: true

logging_steps: 20
save_steps: 400
save_total_limit: 5
output_dir: /scratch/users/zwcolin/cxr_embeds/sft_output/qwen3vl_3x_llmvit_v4

preprocessing_num_workers: 8
dataloader_num_workers: 4
cutoff_len: 2048
report_to: wandb
run_name: sft_qwen3vl_3x_llmvit_v4_r1024

deepspeed: examples/deepspeed/ds_z2_config.json
