### SFT-3x v2: match 5x-v2/v3 setup — test if more capacity helps at 3x too
### v1: 0.826 (base) → 0.854 (+2.8) with r32/1ep

model_name_or_path: Qwen/Qwen3-VL-4B-Instruct
template: qwen3_vl
enable_thinking: false

dataset_dir: /scratch/users/zwcolin/cxr_embeds/sft_data/compressed_3x
dataset: compressed_qa_train
eval_dataset: compressed_qa_eval

stage: sft
do_train: true
finetuning_type: lora
lora_rank: 128
lora_alpha: 128
lora_target: all

per_device_train_batch_size: 2
gradient_accumulation_steps: 8
learning_rate: 2.0e-5
num_train_epochs: 2
lr_scheduler_type: cosine
warmup_ratio: 0.05
max_grad_norm: 1.0
bf16: true

per_device_eval_batch_size: 2
eval_strategy: steps
eval_steps: 400
eval_on_start: false
batch_eval_metrics: true
compute_accuracy: true

logging_steps: 20
save_steps: 800
save_total_limit: 4
output_dir: /scratch/users/zwcolin/cxr_embeds/sft_output/qwen3vl_3x_v2

preprocessing_num_workers: 8
dataloader_num_workers: 4
cutoff_len: 2048
report_to: wandb
run_name: sft_qwen3vl_3x_v2

deepspeed: examples/deepspeed/ds_z2_config.json
