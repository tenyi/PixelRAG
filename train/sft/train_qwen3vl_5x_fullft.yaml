### SFT-5x full FT: capacity vs info-bound test (mirrors 9x fullft)
### LoRA progression: r32/r128 gave only +0.6 bump (saturated). Full FT reveals ceiling.

model_name_or_path: Qwen/Qwen3-VL-4B-Instruct
template: qwen3_vl
enable_thinking: false

dataset_dir: /scratch/users/zwcolin/cxr_embeds/sft_data/compressed_5x
dataset: compressed_qa_train
eval_dataset: compressed_qa_eval

stage: sft
do_train: true
finetuning_type: full

per_device_train_batch_size: 2
gradient_accumulation_steps: 8
learning_rate: 1.0e-5
num_train_epochs: 1
lr_scheduler_type: cosine
warmup_ratio: 0.05
max_grad_norm: 1.0
bf16: true

per_device_eval_batch_size: 2
eval_strategy: steps
eval_steps: 400
eval_on_start: false
batch_eval_metrics: true
compute_accuracy: true

logging_steps: 20
save_steps: 400
save_total_limit: 4
output_dir: /scratch/users/zwcolin/cxr_embeds/sft_output/qwen3vl_5x_fullft

preprocessing_num_workers: 8
dataloader_num_workers: 4
cutoff_len: 2048
report_to: wandb
run_name: sft_qwen3vl_5x_fullft

deepspeed: examples/deepspeed/ds_z3_config.json
