### Top-6 retrieval SFT @ 2x compression, v4 (mixed + 2x top3 oversample)
### v3 (1:1 mixed, r=256) = 0.946/0.950/0.954/0.936 — current 2x best.
### 3x_v5 (2:1 top3:vark mixed) lifted 3x avg LLM-judge by +0.031 vs 1:1 — does it
### generalize to 2x? Hypothesis: yes; the only k where 2x_v3 still trails base@0x
### is k=1 (0.946 vs 0.958), and heavier k=3 weighting might also improve k=1.
