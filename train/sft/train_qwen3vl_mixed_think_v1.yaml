### SFT Universal-think v1: mixed 2x/3x/5x/9x + <think> CoT targets (120k examples)
### Compare vs mixed-llmvit-v1 (no think): 0.920/0.844/0.664/0.272

model_name_or_path: Qwen/Qwen3-VL-4B-Instruct
template: qwen3_vl
enable_thinking: true

dataset_dir: /scratch/users/zwcolin/cxr_embeds/sft_data/think_sft
dataset: think_train_mixed
eval_dataset: think_eval_5x

stage: sft
do_train: true
finetuning_type: lora
freeze_vision_tower: false
lora_rank: 128
lora_alpha: 128
lora_target: all

per_device_train_batch_size: 2
gradient_accumulation_steps: 4
learning_rate: 2.0e-5
num_train_epochs: 1
lr_scheduler_type: cosine
warmup_ratio: 0.03
max_grad_norm: 1.0
bf16: true

per_device_eval_batch_size: 2
eval_strategy: steps
eval_steps: 400
eval_on_start: false
batch_eval_metrics: true
compute_accuracy: true

logging_steps: 30
save_steps: 500
save_total_limit: 5
output_dir: /scratch/users/zwcolin/cxr_embeds/sft_output/qwen3vl_mixed_think_v1

preprocessing_num_workers: 16
dataloader_num_workers: 8
cutoff_len: 2560
report_to: wandb
run_name: sft_qwen3vl_mixed_think_v1_r128

deepspeed: examples/deepspeed/ds_z2_config.json
