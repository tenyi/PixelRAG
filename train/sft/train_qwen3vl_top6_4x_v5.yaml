### Top-6 retrieval SFT @ 4x compression, v5 (vark only, 3 epochs)
### v3 (mixed data) and v4 (r=512 mixed) both regressed at 4x.
### Try the proven v2 recipe (vark only, r=256) but train 1.5x longer (3 epochs)
### to see if 4x is undertrained at 2 epochs (low pixel budget = harder to learn).
model_name_or_path: Qwen/Qwen3-VL-4B-Instruct
template: qwen3_vl
enable_thinking: false

dataset_dir: /scratch/users/zwcolin/cxr_embeds/sft_data/compressed_top6_4x
dataset: multimage_vark_train
eval_dataset: multimage_vark_eval

stage: sft
do_train: true
finetuning_type: lora
freeze_vision_tower: false
lora_rank: 256
lora_alpha: 256
lora_target: all

per_device_train_batch_size: 1
gradient_accumulation_steps: 4
learning_rate: 1.0e-5
num_train_epochs: 3
lr_scheduler_type: cosine
warmup_ratio: 0.03
max_grad_norm: 1.0
bf16: true

per_device_eval_batch_size: 1
eval_strategy: steps
eval_steps: 1600
eval_on_start: false
batch_eval_metrics: true
compute_accuracy: true

logging_steps: 30
save_steps: 1600
save_total_limit: 8
output_dir: /scratch/users/zwcolin/cxr_embeds/sft_output/qwen3vl_top6_4x_v5

preprocessing_num_workers: 8
dataloader_num_workers: 4
cutoff_len: 6144
report_to: wandb
run_name: sft_qwen3vl_top6_4x_v5_vark_r256_3ep

deepspeed: examples/deepspeed/ds_z2_config.json
ddp_timeout: 180000000
