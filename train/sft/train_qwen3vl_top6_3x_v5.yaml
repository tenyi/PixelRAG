### Top-6 retrieval SFT @ 3x compression, v5 (mixed + 2x top3 oversample)
### v3 (mixed 1:1, r=256) = 0.884/0.878/0.892/0.862 — current 3x best.
### v1 (top3 only, k=3 specialist) = 0.900 at k=3 — the v3 k=3 ceiling.
### v4 (mixed + r=512) FAILED: eval loss spiked +0.047 at step 3200 — capacity not bottleneck.
### Hypothesis: 2x top3 oversample biases toward k=3 to recover v1's 0.900 at k=3
### while keeping multi-k generalization from vark. Total per epoch:
###   2 * 104k top3 + 1 * 104k vark = 312k samples (1.5x v3) → ~10h training.
