### SFT-mixed v1: one adapter trained on 2x+3x+5x+9x data
### 416k train examples (4× 104k); 1 epoch ≈ 6500 steps
### Goal: single adapter with blur-invariance, potentially boost 9x via regularization

model_name_or_path: Qwen/Qwen3-VL-4B-Instruct
template: qwen3_vl
enable_thinking: false

dataset_dir: /scratch/users/zwcolin/cxr_embeds/sft_data/compressed_mixed
dataset: mixed_train
eval_dataset: mixed_eval_5x   # middle-ground eval for progress monitoring

stage: sft
do_train: true
finetuning_type: lora
lora_rank: 128
lora_alpha: 128
lora_target: all

per_device_train_batch_size: 2
gradient_accumulation_steps: 8
learning_rate: 2.0e-5
num_train_epochs: 1
lr_scheduler_type: cosine
warmup_ratio: 0.03
max_grad_norm: 1.0
bf16: true

per_device_eval_batch_size: 2
eval_strategy: steps
eval_steps: 1000
eval_on_start: false
batch_eval_metrics: true
compute_accuracy: true

logging_steps: 50
save_steps: 1500
save_total_limit: 5
output_dir: /scratch/users/zwcolin/cxr_embeds/sft_output/qwen3vl_mixed_v1

preprocessing_num_workers: 16
dataloader_num_workers: 8
cutoff_len: 2048
report_to: wandb
run_name: sft_qwen3vl_mixed_v1_r128

deepspeed: examples/deepspeed/ds_z2_config.json
