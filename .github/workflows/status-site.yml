name: Status Site CI
on:
  push:
    branches: [main]
    paths:
      - "status-site/**"
      - ".github/workflows/status-site.yml"
  workflow_dispatch:
permissions:
  contents: write
  pages: write
jobs:
  deploy:
    name: Deploy static status page
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Deploy to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: ./status-site
          clean: true
